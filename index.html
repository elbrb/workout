<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scheda Allenamento 🎀</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --aubergine:#2b1a24; --plum:#7a3b69; --rose:#c9789c; --rose-soft:#e0a3bf;
    --blush:#f7e8ef; --blush-2:#fbf3f7; --gold:#c2a06a;
    --paper:#fdfafb; --line:#eaddda; --ok:#8a9a5b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Jost',sans-serif;
    background:radial-gradient(900px 420px at 100% -10%, #fdeef4 0%, transparent 60%), var(--paper);
    color:var(--aubergine); line-height:1.5; padding:24px 14px 54px; min-height:100vh;
  }
  .wrap{max-width:760px;margin:0 auto}

  header{text-align:center;margin-bottom:22px}
  h1{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:clamp(34px,9vw,50px);color:var(--plum);line-height:1;letter-spacing:.5px}
  h1 .heart{font-size:.55em;vertical-align:middle}
  .rule{width:56px;height:2px;margin:12px auto 0;background:linear-gradient(90deg,transparent,var(--gold),transparent)}

  .tabs{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:20px}
  .tab{
    font-family:'Jost',sans-serif;font-size:13px;font-weight:500;letter-spacing:.02em;
    color:var(--plum);background:#fff;border:1px solid var(--line);
    padding:9px 16px;border-radius:999px;cursor:pointer;transition:all .2s ease;
  }
  .tab:hover{border-color:var(--rose-soft)}
  .tab.active{background:linear-gradient(135deg,var(--plum),var(--rose));color:#fff;border-color:transparent;box-shadow:0 5px 15px rgba(201,120,156,.32)}

  .panel{display:none;animation:fade .3s ease}
  .panel.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  .section-label{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--rose);font-weight:600;margin-bottom:11px;display:flex;align-items:center;gap:10px}
  .section-label::after{content:"";flex:1;height:1px;background:var(--line)}

  /* reference week */
  .week{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:30px}
  .day{background:var(--blush-2);border:1px solid var(--line);border-radius:10px;padding:9px 5px;text-align:center}
  .day .dn{font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--rose);font-weight:600;margin-bottom:5px}
  .day .act{font-size:10.5px;color:var(--aubergine);line-height:1.25}
  .day.rest{background:transparent;border-style:dashed}
  .day.rest .act{color:#b9a7af}

  /* planner */
  .planner{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .pslot .dn{font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--plum);font-weight:600;margin-bottom:5px;text-align:center}
  .pslot select{width:100%;font-family:'Jost',sans-serif;font-size:11px;color:var(--aubergine);padding:8px 3px;border-radius:9px;border:1px solid var(--line);background:#fff;cursor:pointer;text-align:center}
  .pslot select:focus{outline:none;border-color:var(--rose);box-shadow:0 0 0 3px rgba(201,120,156,.15)}
  .pslot select.v-rest{color:#b9a7af}
  .planner-hint{font-size:12px;color:#a8969d;margin-top:11px}

  /* backup */
  .backup-row{display:flex;justify-content:flex-end;margin-bottom:16px}
  .backup{position:relative}
  .backup-menu{position:absolute;right:0;top:calc(100% + 6px);z-index:10;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 10px 28px rgba(122,59,105,.14);padding:6px;min-width:180px;display:none}
  .backup-menu.open{display:block;animation:fade .2s ease}
  .backup-menu button{display:block;width:100%;text-align:left;font-family:'Jost',sans-serif;font-size:13px;color:var(--aubergine);background:transparent;border:none;padding:10px 12px;border-radius:8px;cursor:pointer;transition:background .15s ease}
  .backup-menu button:hover{background:var(--blush)}

  /* workout head */
  .panel-head{display:flex;align-items:baseline;gap:10px;margin-bottom:2px;flex-wrap:wrap}
  .panel-head h2{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:26px;color:var(--plum)}
  .panel-head .focus{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--rose);font-weight:500}
  .panel-sub{font-size:12px;color:#9c8a91;margin-bottom:13px}

  /* compact editable exercise cards */
  .ex-table{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#fff}
  .ex{padding:9px 11px;display:flex;flex-direction:column;gap:7px}
  .ex:not(:last-child){border-bottom:1px solid var(--line)}
  .ex:nth-child(even){background:var(--blush-2)}
  .ex.glute{border-left:3px solid var(--gold)}
  .in-name{font-family:'Jost',sans-serif;font-weight:500;font-size:14px;color:var(--aubergine);border:none;background:transparent;width:100%;padding:2px 0;border-bottom:1px solid transparent}
  .in-name:focus{outline:none;border-bottom:1px solid var(--rose)}
  .in-name::placeholder{color:#c9b9bf}
  .ex-meta{display:flex;align-items:center;gap:8px}
  .mini{display:flex;align-items:center;gap:5px;background:#fff;border:1px solid var(--line);border-radius:8px;padding:4px 8px}
  .ex:nth-child(even) .mini{background:#fff}
  .mini span{font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--rose);font-weight:600;white-space:nowrap}
  .mini input{font-family:'Jost',sans-serif;border:none;background:transparent;font-size:13px;color:var(--aubergine);width:54px}
  .mini.serie input{width:66px}
  .mini input:focus{outline:none}
  .mini input::placeholder{color:#c9b9bf}
  .rm{margin-left:auto;width:26px;height:26px;flex:none;border:1px solid var(--line);background:#fff;border-radius:7px;color:var(--rose);font-size:15px;line-height:1;cursor:pointer;transition:all .15s ease}
  .rm:hover{background:var(--blush);border-color:var(--rose-soft)}

  .add-ex{margin-top:9px;font-family:'Jost',sans-serif;font-size:13px;font-weight:500;color:var(--plum);background:#fff;border:1px dashed var(--rose-soft);border-radius:10px;padding:10px;width:100%;cursor:pointer;transition:all .16s ease}
  .add-ex:hover{background:var(--blush);border-style:solid}

  .savebar{display:flex;align-items:center;gap:10px;margin-top:14px;flex-wrap:wrap}
  .status{font-size:12px;color:#9c8a91}
  .status b{color:var(--ok);font-weight:500}
  button.act-btn{font-family:'Jost',sans-serif;font-size:12px;font-weight:500;letter-spacing:.02em;padding:8px 15px;border-radius:999px;cursor:pointer;border:1px solid var(--line);background:#fff;color:var(--plum);transition:all .18s ease}
  button.act-btn:hover{border-color:var(--rose-soft)}
  .lastdone{display:flex;align-items:center;gap:7px;font-size:11.5px;color:#9c8a91;margin-left:auto}
  .lastdone input{font-family:'Jost',sans-serif;font-size:11.5px;color:var(--aubergine);padding:6px 8px;border-radius:8px;border:1px solid var(--line);background:#fff}
  .lastdone input:focus{outline:none;border-color:var(--rose)}

  .note{font-size:11.5px;color:#a8969d;text-align:center;margin-top:26px;line-height:1.6}

  /* wider screens: row layout for exercises + roomier week */
  @media(min-width:620px){
    .ex{flex-direction:row;align-items:center;gap:12px;padding:9px 14px}
    .in-name{flex:1;padding:4px 0}
    .day .act{font-size:11.5px}
    .day .dn{font-size:10px}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>La mia scheda <span class="heart">🎀</span></h1>
    <div class="rule"></div>
  </header>

  <div class="tabs" id="tabs"></div>

  <div class="panel active" data-idx="week">
    <div class="backup-row">
      <div class="backup">
        <button class="act-btn" id="backupBtn">Backup ▾</button>
        <div class="backup-menu" id="backupMenu">
          <button data-bk="export">⬇ Esporta backup</button>
          <button data-bk="import">⬆ Importa backup</button>
        </div>
      </div>
    </div>

    <div class="section-label">Esempio consigliato</div>
    <div class="week" id="weekRef"></div>

    <div class="section-label">La mia settimana</div>
    <div class="planner" id="planner"></div>
    <p class="planner-hint">Assegna a ogni giorno l'attività che preferisci: le scelte restano salvate.</p>
  </div>

  <div id="panels"></div>

  <p class="note">
    Esercizi, carichi e organizzazione settimanale restano salvati in questo browser.<br>
    Range 10-15 ripetizioni · carichi moderati · priorità recupero per non infiammare.
  </p>
</div>

<script>
const WEEK_REF = [
  {dn:"Lun", act:"Total Body A"},
  {dn:"Mar", act:"Acquagym"},
  {dn:"Mer", act:"Riposo", rest:true},
  {dn:"Gio", act:"Total Body B"},
  {dn:"Ven", act:"Riposo", rest:true},
  {dn:"Sab", act:"Total Body C"},
  {dn:"Dom", act:"Corsa"},
];
const ACTIVITIES = ["Riposo","Total Body A","Total Body B","Total Body C","Acquagym","Corsa","Mobilità / Stretching"];
const DAYS = ["Lun","Mar","Mer","Gio","Ven","Sab","Dom"];

const META = {
  A:{label:"Total Body A", day:"Lunedì", focus:"Glutei"},
  B:{label:"Total Body B", day:"Giovedì", focus:"Spalle + Addome"},
  C:{label:"Total Body C", day:"Sabato", focus:"Glutei + Addome"},
};
const DEFAULT_WK = {
  A:[
    {n:"Hip thrust", s:"4 x 10-12", kg:"", g:true},
    {n:"RDL", s:"3 x 10", kg:"", g:true},
    {n:"Abductor machine", s:"3 x 15", kg:"", g:true},
    {n:"Lat machine", s:"3 x 10", kg:"", g:false},
    {n:"Plank + varianti laterali", s:"3 x 30-40\"", kg:"", g:false},
  ],
  B:[
    {n:"Alzate laterali", s:"4 x 15", kg:"", g:false},
    {n:"Arnold press", s:"3 x 10", kg:"", g:false},
    {n:"Affondi bulgari", s:"3 x 10 / gamba", kg:"", g:true},
    {n:"Cable kick-back", s:"3 x 12 / gamba", kg:"", g:true},
    {n:"Crunch su fitball", s:"3 x 15", kg:"", g:false},
    {n:"Russian twist", s:"3 x 20", kg:"", g:false},
  ],
  C:[
    {n:"Hip thrust", s:"4 x 10-12", kg:"", g:true},
    {n:"Leg press monopodalico", s:"3 x 12 / gamba", kg:"", g:true},
    {n:"Abductor machine", s:"3 x 15", kg:"", g:true},
    {n:"Pallof press", s:"3 x 12 / lato", kg:"", g:false},
    {n:"Mountain climber", s:"3 x 20", kg:"", g:false},
  ],
};

const K_WK="scheda_workouts_v1", K_WEEK="scheda_settimana_v1", K_DONE="scheda_ultima_v1";
const loadObj = k => { try{return JSON.parse(localStorage.getItem(k))}catch(e){return null} };
const save = (k,v) => localStorage.setItem(k, JSON.stringify(v));
const esc = s => String(s??"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

let workouts = loadObj(K_WK) || JSON.parse(JSON.stringify(DEFAULT_WK));
let myWeek = loadObj(K_WEEK) || WEEK_REF.map(d=>d.act);
let doneDates = loadObj(K_DONE) || {};

// reference week
const refEl=document.getElementById("weekRef");
WEEK_REF.forEach(d=>{
  const el=document.createElement("div");
  el.className="day"+(d.rest?" rest":"");
  el.innerHTML=`<div class="dn">${d.dn}</div><div class="act">${d.act}</div>`;
  refEl.appendChild(el);
});

// planner
const plEl=document.getElementById("planner");
DAYS.forEach((dn,i)=>{
  const slot=document.createElement("div");
  slot.className="pslot";
  const opts=ACTIVITIES.map(a=>`<option value="${a}"${myWeek[i]===a?" selected":""}>${a}</option>`).join("");
  slot.innerHTML=`<div class="dn">${dn}</div><select data-day="${i}">${opts}</select>`;
  plEl.appendChild(slot);
});
const paint=sel=>sel.classList.toggle("v-rest",sel.value==="Riposo");
plEl.querySelectorAll("select").forEach(sel=>{
  paint(sel);
  sel.addEventListener("change",()=>{ myWeek[+sel.dataset.day]=sel.value; save(K_WEEK,myWeek); paint(sel); });
});

// tabs + panels
const tabsEl=document.getElementById("tabs");
const panelsEl=document.getElementById("panels");
function mkTab(idx,label,active){
  const t=document.createElement("button");
  t.className="tab"+(active?" active":""); t.textContent=label; t.dataset.idx=idx;
  tabsEl.appendChild(t);
}
mkTab("week","Settimana",true);

["A","B","C"].forEach(wid=>{
  mkTab(wid,`Workout ${wid}`,false);
  const m=META[wid];
  const p=document.createElement("div");
  p.className="panel"; p.dataset.idx=wid;
  p.innerHTML=`
    <div class="panel-head"><h2>${m.label}</h2><span class="focus">${m.day} · ${m.focus}</span></div>
    <div class="panel-sub">Tocca un campo per modificare esercizio, serie o carico.</div>
    <div class="ex-table" data-tbl="${wid}"></div>
    <button class="add-ex" data-add="${wid}">+ Aggiungi esercizio</button>
    <div class="savebar">
      <div class="status" data-status="${wid}">Le modifiche si salvano da sole.</div>
      <button class="act-btn" data-clear="${wid}">Azzera carichi</button>
      <label class="lastdone">Ultima seduta
        <input type="date" data-done="${wid}" value="${doneDates[wid]||""}">
      </label>
    </div>`;
  panelsEl.appendChild(p);
  renderTable(wid);
});

function exCard(wid,e,j){
  return `<div class="ex${e.g?" glute":""}" data-row="${wid}-${j}">
    <input class="in-name" data-f="n" placeholder="Nome esercizio" value="${esc(e.n)}">
    <div class="ex-meta">
      <label class="mini serie"><span>Serie</span><input data-f="s" placeholder="—" value="${esc(e.s)}"></label>
      <label class="mini"><span>kg</span><input data-f="kg" inputmode="decimal" placeholder="—" value="${esc(e.kg)}"></label>
      <button class="rm" data-rm="${wid}-${j}" title="Rimuovi">×</button>
    </div>
  </div>`;
}
function renderTable(wid){
  const tbl=document.querySelector(`[data-tbl="${wid}"]`);
  tbl.innerHTML=workouts[wid].map((e,j)=>exCard(wid,e,j)).join("");
}
function flashSaved(wid){
  const st=document.querySelector(`[data-status="${wid}"]`);
  if(!st) return;
  st.innerHTML="<b>Salvato ✓</b>"; clearTimeout(st._t);
  st._t=setTimeout(()=>st.textContent="Le modifiche si salvano da sole.",1400);
}

// tab switching
tabsEl.addEventListener("click",e=>{
  const t=e.target.closest(".tab"); if(!t) return;
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  document.querySelectorAll(".panel").forEach(x=>x.classList.remove("active"));
  t.classList.add("active");
  document.querySelector(`.panel[data-idx="${t.dataset.idx}"]`).classList.add("active");
});

// edit exercise fields (no re-render: keeps focus)
document.body.addEventListener("input",e=>{
  const inp=e.target.closest(".ex input[data-f]"); if(!inp) return;
  const [wid,j]=inp.closest(".ex").dataset.row.split("-");
  workouts[wid][+j][inp.dataset.f]=inp.value;
  save(K_WK,workouts); flashSaved(wid);
});

// add / remove / clear / date
document.body.addEventListener("click",e=>{
  const add=e.target.closest("[data-add]");
  if(add){ const wid=add.dataset.add; workouts[wid].push({n:"",s:"",kg:"",g:false}); save(K_WK,workouts); renderTable(wid); flashSaved(wid); return; }

  const rm=e.target.closest("[data-rm]");
  if(rm){ const [wid,j]=rm.dataset.rm.split("-"); workouts[wid].splice(+j,1); save(K_WK,workouts); renderTable(wid); flashSaved(wid); return; }

  const clr=e.target.closest("[data-clear]");
  if(clr){ const wid=clr.dataset.clear;
    if(!confirm(`Azzerare i carichi del Workout ${wid}?`)) return;
    workouts[wid].forEach(x=>x.kg=""); save(K_WK,workouts); renderTable(wid); flashSaved(wid); return; }
});
document.body.addEventListener("change",e=>{
  const d=e.target.closest("input[data-done]"); if(!d) return;
  doneDates[d.dataset.done]=d.value; save(K_DONE,doneDates);
});

// backup
const backupBtn=document.getElementById("backupBtn");
const backupMenu=document.getElementById("backupMenu");
backupBtn.addEventListener("click",e=>{ e.stopPropagation(); backupMenu.classList.toggle("open"); });
document.addEventListener("click",e=>{ if(!e.target.closest(".backup")) backupMenu.classList.remove("open"); });
backupMenu.addEventListener("click",e=>{
  const b=e.target.closest("[data-bk]"); if(!b) return;
  backupMenu.classList.remove("open");
  b.dataset.bk==="export" ? doExport() : doImport();
});
function doExport(){
  const payload={versione:2,esportato:new Date().toISOString(),workouts,settimana:myWeek,ultimaSeduta:doneDates};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob), a=document.createElement("a");
  a.href=url; a.download=`backup-scheda-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
}
function doImport(){
  const inp=document.createElement("input"); inp.type="file"; inp.accept="application/json,.json";
  inp.addEventListener("change",()=>{
    const f=inp.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=()=>{ try{
      const p=JSON.parse(r.result);
      if(p.workouts) save(K_WK,p.workouts);
      if(p.settimana) save(K_WEEK,p.settimana);
      if(p.ultimaSeduta) save(K_DONE,p.ultimaSeduta);
      alert("Backup importato ✓ La pagina si ricarica."); location.reload();
    }catch(err){ alert("File non valido: non è un backup della scheda."); } };
    r.readAsText(f);
  });
  inp.click();
}
</script>
</body>
</html>
